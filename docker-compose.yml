version: "3.8"

# MiniStack — local AWS emulator
# Free, MIT licensed, Terraform compatible via tflocal
# Endpoint: http://localhost:4566

services:
  ministack:
    image: ministackorg/ministack:latest
    ports:
      - "4566:4566"
    environment:
      - PERSIST_STATE=1
    volumes:
      - ministack_state:/var/lib/ministack
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4566/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ministack_state:
